                    <div className="text-center py-20 bg-white dark:bg-zinc-900 border border-neutral-200/20 dark:border-zinc-800 rounded-3xl">
                      <div className="bg-neutral-100 dark:bg-zinc-800 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg className="w-8 h-8 text-neutral-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                      </div>
                      <h3 className="text-lg font-medium">{t.noResults}</h3>
                      <p className="text-neutral-500 text-sm mt-1">{t.noResultsDesc}</p>
                    </div>
                  )}
                </div>

              </main>

              {/* Detail Modal Dialog */}
              {selectedRule && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/50 dark:bg-black/80 backdrop-blur-sm" onClick={() => setSelectedRule(null)}></div>
                  
                  <div className="relative bg-white dark:bg-zinc-950 w-full max-w-2xl rounded-3xl shadow-2xl flex flex-col max-h-[85vh] border border-neutral-200/50 dark:border-zinc-800/80 overflow-hidden">
                    
                    {/* Modal Header */}
                    <div className="p-6 md:p-8 pb-5 border-b border-neutral-100 dark:border-zinc-800/50 shrink-0">
                      <div className="flex justify-between items-start gap-4">
                        <div className="flex items-center gap-3">
                          <div className={`relative overflow-hidden w-14 h-14 rounded-2xl border flex flex-col items-center justify-center font-bold text-center px-1 leading-tight shadow-sm ${getAirlineColor(selectedRule.title[lang])} ${getAirlineName(selectedRule.title[lang]).length > 7 ? 'text-[9px]' : 'text-[11px]'}`}>
                            {getAirlineName(selectedRule.title[lang]).split(' ').map((part, idx) => (
                              <span key={idx} className="block relative z-10">{part}</span>
                            ))}
                          </div>
                          <div>
                            <div className="flex items-center gap-2 mb-1">
                              <span className="text-[10px] font-bold text-neutral-400 uppercase tracking-widest">{t.ruleDetail}</span>
                              <div className="h-1 w-1 rounded-full bg-neutral-300 dark:bg-neutral-700" />
                              <span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest">#{selectedRule.id}</span>
                            </div>
                            <h2 className="text-xl font-bold leading-tight">{selectedRule.title[lang]}</h2>
                          </div>
                        </div>

                        {/* Copy & Close Action Buttons */}
                        <div className="flex items-center gap-1.5 shrink-0">
                          <button
                            onClick={() => handleCopy(selectedRule)}
                            className="p-2 bg-neutral-100 hover:bg-neutral-200 dark:bg-zinc-850 dark:hover:bg-zinc-800 rounded-lg transition"
                            title="Copy Details"
                          >
                            {copied ? (
                              <svg className="w-5 h-5 text-green-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" /></svg>
                            ) : (
                              <svg className="w-5 h-5 text-neutral-500 dark:text-neutral-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" /></svg>
                            )}
                          </button>
                          <button
                            onClick={() => setSelectedRule(null)}
                            className="p-2 bg-neutral-100 hover:bg-neutral-200 dark:bg-zinc-850 dark:hover:bg-zinc-800 rounded-lg transition"
                          >
                            <svg className="w-5 h-5 text-neutral-500 dark:text-neutral-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                          </button>
                        </div>
                      </div>
                    </div>

                    {/* Scrollable Modal Content */}
                    <div className="flex-1 overflow-y-auto p-6 md:p-8 pt-5">
                      <div className="space-y-4">
                        <div className="flex items-center gap-2 text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-950/30 px-4 py-2 rounded-full w-fit">
                          <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                          <span className="text-[10px] font-bold uppercase tracking-wider">{t.appliedRules}</span>
                        </div>
                        
                        <div className="p-6 rounded-2xl bg-neutral-25 dark:bg-zinc-900 border border-neutral-200/40 dark:border-zinc-800/50">
                          <div className="text-neutral-800 dark:text-neutral-200 whitespace-pre-line leading-relaxed text-sm md:text-base space-y-2.5 font-medium select-text">
                            {selectedRule.details[lang].join('\n')}
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Modal Footer */}
                    <div className="p-6 md:p-8 pt-4 border-t border-neutral-100 dark:border-zinc-800/50 shrink-0 bg-white dark:bg-zinc-950 flex flex-col md:flex-row items-center justify-between gap-4">
                      <p className="text-[11px] text-neutral-500 dark:text-neutral-400 italic font-medium">
                        {t.disclaimer}
                      </p>
                      <button
                        onClick={() => setSelectedRule(null)}
                        className="w-full md:w-auto bg-black dark:bg-white text-white dark:text-black px-6 py-2.5 rounded-xl text-xs font-bold transition hover:opacity-90 shadow-sm"
                      >
                        {t.close}
                      </button>
                    </div>

                  </div>
                </div>
              )}

              {/* Page Footer */}
              <footer className="max-w-5xl mx-auto px-4 py-12 md:px-8 border-t border-black/5 dark:border-white/5 mt-12 text-center">
                <p className="text-[10px] text-neutral-400 dark:text-neutral-500 font-bold tracking-wider uppercase">
                  {t.copyright}
                </p>
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
