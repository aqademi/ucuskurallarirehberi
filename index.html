                                    <button
                                        onClick={() => setIsDarkMode(prev => !prev)}
                                        className="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all"
                                        aria-label="Theme Change"
                                    >
                                        {isDarkMode ? <SunIcon className="w-5 h-5" /> : <MoonIcon className="w-5 h-5" />}
                                    </button>
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                <div className="relative group flex-1 md:flex-none">
                                    <SearchIcon className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 group-focus-within:text-blue-500 transition-colors" />
                                    <input
                                        type="text"
                                        placeholder={t.searchPlaceholder}
                                        className="w-full md:w-80 bg-gray-100 dark:bg-gray-800 border border-transparent rounded-2xl py-2.5 pl-10 pr-4 text-sm focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500/40 focus:bg-white dark:focus:bg-gray-700 transition-all outline-none dark:text-white"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>

                                <button
                                    onClick={() => setLang(l => l === 'tr' ? 'en' : 'tr')}
                                    className="hidden md:flex p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all items-center gap-1.5"
                                >
                                    <LanguagesIcon className="w-4 h-4" />
                                    <span className="text-xs font-bold uppercase">{lang}</span>
                                </button>

                                <button
                                    onClick={() => setIsDarkMode(prev => !prev)}
                                    className="hidden md:flex p-2.5 rounded-xl bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all"
                                    aria-label="Theme Change"
                                >
                                    {isDarkMode ? <SunIcon className="w-5 h-5" /> : <MoonIcon className="w-5 h-5" />}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-8 md:px-8">
                        {/* Stats / Info */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div className="bg-white dark:bg-[#111726] p-5 rounded-3xl border border-black/5 dark:border-white/5 shadow-xs">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="bg-green-100 dark:bg-green-905/30 p-2 rounded-xl">
                                        <ShieldCheckIcon className="w-5 h-5 text-green-600 dark:text-green-400" />
                                    </div>
                                    <span className="text-sm font-semibold text-gray-600 dark:text-gray-400">{t.currentData}</span>
                                </div>
                                <p className="text-2xl font-semibold tracking-tight">{t.classes}</p>
                            </div>
                            
                            <div className="bg-white dark:bg-[#111726] p-5 rounded-3xl border border-black/5 dark:border-white/5 shadow-xs">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="bg-blue-100 dark:bg-blue-905/30 p-2 rounded-xl">
                                        <ClockIcon className="w-5 h-5 text-blue-600 dark:text-blue-400" />
                                    </div>
                                    <span className="text-sm font-semibold text-gray-600 dark:text-gray-400">{t.timeBased}</span>
                                </div>
                                <p className="text-2xl font-semibold tracking-tight">{t.flexible}</p>
                            </div>

                            <div className="bg-white dark:bg-[#111726] p-5 rounded-3xl border border-black/5 dark:border-white/5 shadow-xs">
                                <div className="flex items-center gap-3 mb-2">
                                    <div className="bg-purple-100 dark:bg-purple-905/30 p-2 rounded-xl">
                                        <CreditCardIcon className="w-5 h-5 text-purple-600 dark:text-purple-400" />
                                    </div>
                                    <span className="text-sm font-semibold text-gray-600 dark:text-gray-400">{t.refundExchange}</span>
                                </div>
                                <p className="text-2xl font-semibold tracking-tight">{t.netFees}</p>
                            </div>
                        </div>

                        {/* Rules List */}
                        <div className="space-y-3">
                            {filteredRules.length > 0 ? (
                                filteredRules.map((rule) => {
                                    const airlineName = getAirlineName(rule.title[lang]);
                                    const airlineColor = getAirlineColor(rule.title[lang]);
                                    
                                    return (
                                        <div
                                            key={rule.id}
                                            onClick={() => setSelectedRule(rule)}
                                            className="w-full bg-white dark:bg-[#111726] hover:bg-gray-50 dark:hover:bg-[#171f33] border border-black/5 dark:border-white/5 rounded-2xl p-4 flex items-center justify-between transition-all duration-200 cursor-pointer hover:-translate-y-0.5 hover:shadow-md group text-left"
                                        >
                                            <div className="flex items-center gap-4 flex-1 min-w-0">
                                                <div className={`relative overflow-hidden shrink-0 w-12 h-12 rounded-xl border flex flex-col items-center justify-center font-extrabold text-center px-1 leading-tight shadow-xs ${airlineColor} ${airlineName.length > 7 ? 'text-[8px]' : airlineName.length >= 7 ? 'text-[9px]' : airlineName.length > 4 ? 'text-[10px]' : 'text-xs'}`}>
                                                    <PlaneIcon className="absolute -right-1 -bottom-1 w-8 h-8 opacity-10 dark:opacity-20 -rotate-12 pointer-events-none" />
                                                    {airlineName.split(' ').map((part, i) => (
                                                        <span key={i} className="block relative z-10">{part}</span>
                                                    ))}
                                                </div>
                                                <div className="flex-1 min-w-0 pr-2">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">#{rule.id}</span>
                                                        <div className="h-1 w-1 rounded-full bg-gray-300 dark:bg-gray-700" />
                                                        <span className="text-[10px] font-bold text-blue-500 dark:text-blue-400 uppercase tracking-widest">{airlineName}</span>
                                                    </div>
                                                    <h3 className="font-semibold text-sm md:text-base pr-4 leading-snug text-gray-900 dark:text-gray-100 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                                                        {rule.title[lang]}
                                                    </h3>
                                                </div>
                                            </div>
                                            <div className="shrink-0 flex items-center justify-center">
                                                <ChevronRightIcon className="w-5 h-5 text-gray-300 dark:text-gray-600 group-hover:text-blue-500 dark:group-hover:text-blue-400 group-hover:translate-x-0.5 transition-all" />
                                            </div>
                                        </div>
                                    );
                                })
                            ) : (
                                <div className="text-center py-20 bg-white dark:bg-[#111726] rounded-3xl border border-black/5 dark:border-white/5">
                                    <div className="bg-gray-100 dark:bg-gray-800 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <SearchIcon className="w-8 h-8 text-gray-300 dark:text-gray-600" />
                                    </div>
                                    <h3 className="text-lg font-bold text-gray-900 dark:text-white">{t.noResults}</h3>
                                    <p className="text-gray-500 dark:text-gray-400 text-sm mt-1">{t.noResultsDesc}</p>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Highly Polished Detail Modal */}
                    {selectedRule && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div 
                                onClick={() => setSelectedRule(null)} 
                                className="absolute inset-0 bg-black/50 dark:bg-[#05070c]/80 backdrop-blur-xs transition-opacity duration-300"
                            />
                            
                            <div className="relative bg-white dark:bg-[#111726] w-full max-w-2xl rounded-[28px] shadow-2xl flex flex-col max-h-[85vh] border border-black/5 dark:border-white/10 overflow-hidden transform transition-all duration-300 scale-100 opacity-100">
                                {/* Header */}
                                <div className="p-6 md:p-8 pb-5 border-b border-gray-100 dark:border-white/5 shrink-0 bg-gray-50/50 dark:bg-[#151c2e]/50">
                                    <div className="flex justify-between items-start">
                                        <div className="flex items-center gap-3">
                                            <div className={`relative overflow-hidden w-14 h-14 rounded-2xl border flex flex-col items-center justify-center font-extrabold text-center px-1 leading-tight shadow-inner ${getAirlineColor(selectedRule.title[lang])} ${getAirlineName(selectedRule.title[lang]).length > 7 ? 'text-[9px]' : getAirlineName(selectedRule.title[lang]).length >= 7 ? 'text-[10px]' : getAirlineName(selectedRule.title[lang]).length > 4 ? 'text-[11px]' : 'text-sm'}`}>
                                                <PlaneIcon className="absolute -right-1 -bottom-1 w-10 h-10 opacity-10 dark:opacity-20 -rotate-12 pointer-events-none" />
                                                {getAirlineName(selectedRule.title[lang]).split(' ').map((part, i) => (
                                                    <span key={i} className="block relative z-10">{part}</span>
                                                ))}
                                            </div>
                                            <div>
                                                <div className="flex items-center gap-2 mb-0.5">
                                                    <span className="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">{t.ruleDetail}</span>
                                                    <div className="h-1 w-1 rounded-full bg-gray-300 dark:bg-gray-700" />
                                                    <span className="text-[10px] font-bold text-blue-500 dark:text-blue-400 uppercase tracking-widest">#{selectedRule.id}</span>
                                                </div>
                                                <h2 className="text-lg md:text-xl font-bold leading-tight dark:text-white">{selectedRule.title[lang]}</h2>
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center gap-2 shrink-0">
                                            <button
                                                onClick={() => handleCopy(selectedRule)}
                                                className="p-2.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-all flex items-center justify-center group"
                                                title="Copy"
                                            >
                                                {copied ? (
                                                    <CheckIcon className="w-5 h-5 text-green-500" />
                                                ) : (
                                                    <CopyIcon className="w-5 h-5 text-gray-400 dark:text-gray-500 group-hover:text-blue-500 transition-colors" />
                                                )}
                                            </button>
                                            <button
                                                onClick={() => setSelectedRule(null)}
                                                className="p-2.5 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors flex items-center justify-center"
                                            >
                                                <XIcon className="w-5 h-5 text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-white" />
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                {/* Content Details */}
                                <div className="flex-1 overflow-y-auto p-6 md:p-8">
                                    <div className="space-y-4">
                                        <div className="flex items-center gap-2 text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20 px-3 py-1.5 rounded-full w-fit">
                                            <InfoIcon className="w-4 h-4" />
                                            <span className="text-[10px] font-extrabold uppercase tracking-widest">{t.appliedRules}</span>
                                        </div>
                                        
                                        <div className="space-y-3">
                                            {selectedRule.details[lang].map((detail) => renderDetailItem(detail))}
                                        </div>
                                    </div>
                                </div>

                                {/* Footer */}
                                <div className="p-6 border-t border-gray-100 dark:border-white/5 shrink-0 bg-gray-50 dark:bg-[#131b2e] flex flex-col md:flex-row items-center justify-between gap-4">
                                    <p className="text-xs text-gray-400 dark:text-gray-500 font-medium italic">
                                        {t.disclaimer}
                                    </p>
                                    <button
                                        onClick={() => setSelectedRule(null)}
                                        className="w-full md:w-auto bg-gray-900 dark:bg-white text-white dark:text-gray-900 px-8 py-3 rounded-2xl font-bold text-sm hover:bg-black dark:hover:bg-gray-100 transition-colors shadow-lg"
                                    >
                                        {t.close}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="max-w-5xl mx-auto px-4 py-12 md:px-8 border-t border-black/5 dark:border-white/5 mt-12 text-center">
                        <p className="text-xs text-gray-400 dark:text-gray-500 font-semibold tracking-wider uppercase">
                            {t.copyright}
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
